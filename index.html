<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楓谷風票數統計抽獎工具</title>

<style>
:root{
  --name-col-width: 180px;
  --vote-col-width: 135px;
}

*{box-sizing:border-box}

body{
  font-family:"Microsoft JhengHei",sans-serif;
  margin:0;
  padding:20px;
  color:#374151;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 15% 15%, #ffffff 0 4%, transparent 5%),
    radial-gradient(circle at 80% 12%, #ffffff 0 5%, transparent 6%),
    linear-gradient(180deg,#bde7ff 0%,#e9f8ff 45%,#fff4c7 100%);
  min-height:100vh;
}

h1{
  text-align:center;
  margin:8px 0 6px;
  color:#4b5563;
  text-shadow:2px 2px 0 #fff;
}

.subtitle{
  text-align:center;
  font-weight:bold;
  color:#f97316;
  margin-bottom:10px;
}

.toolbar{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:16px;
}

button{
  border:3px solid #8b5e34;
  background:linear-gradient(#ffe38a,#f59e0b);
  color:#4b2e13;
  padding:8px 14px;
  border-radius:14px;
  cursor:pointer;
  font-size:15px;
  font-weight:bold;
  box-shadow:0 4px 0 #8b5e34, 0 6px 12px rgba(0,0,0,.15);
}

button:hover{filter:brightness(1.05)}
button:active{transform:translateY(3px);box-shadow:0 1px 0 #8b5e34}
button:disabled{
  background:#cbd5e1;
  color:#64748b;
  border-color:#94a3b8;
  box-shadow:none;
  cursor:not-allowed;
}

.blue-btn{background:linear-gradient(#93c5fd,#3b82f6);color:#fff}
.red-btn{background:linear-gradient(#fca5a5,#ef4444);color:#fff}
.green-btn{background:linear-gradient(#86efac,#22c55e);color:#064e3b}
.purple-btn{background:linear-gradient(#d8b4fe,#a855f7);color:#fff}

.status{
  text-align:center;
  margin-bottom:12px;
  font-weight:bold;
}

.readonly{color:#dc2626}
.editing{color:#16a34a}

.panel{
  background:rgba(255,255,255,.72);
  border:3px solid #8b5e34;
  border-radius:18px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.summary{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:12px;
  font-weight:bold;
}

.badge{
  background:#fff7ed;
  border:2px solid #fdba74;
  color:#9a3412;
  padding:6px 12px;
  border-radius:999px;
}

.table-wrap{
  overflow:auto;
  background:white;
  border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
  padding:0;
  max-height:66vh;
  border:3px solid #8b5e34;
  position:relative;
  width:100%;
}

table{
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
  width:max-content;
}

th,td{
  border-right:1px solid #d1d5db;
  border-bottom:1px solid #d1d5db;
  padding:8px;
  text-align:center;
  min-width:var(--vote-col-width);
  width:var(--vote-col-width);
  background:white;
}

th{
  background:#e0f2fe;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:3;
}

.name-col{
  position:sticky;
  left:0;
  z-index:10;
  min-width:var(--name-col-width);
  width:var(--name-col-width);
  background:#fef3c7 !important;
  font-weight:bold;
  box-shadow:4px 0 8px rgba(0,0,0,.18);
}

th.name-col{
  z-index:20;
}

.total-col{
  background:#dcfce7;
  font-weight:bold;
}

.rate-col{
  background:#f3e8ff;
  font-weight:bold;
  color:#7e22ce;
}

.total-row td{
  background:#fee2e2;
  font-weight:bold;
}

.total-row .name-col{
  background:#fecaca !important;
}

.scroll-spacer{
  min-width:calc(100vw - var(--name-col-width) - var(--vote-col-width) * 2 - 60px);
  width:calc(100vw - var(--name-col-width) - var(--vote-col-width) * 2 - 60px);
  border-right:0;
  background:transparent !important;
  pointer-events:none;
}

input{
  width:100%;
  padding:6px;
  text-align:center;
  border:1px solid #cbd5e1;
  border-radius:8px;
  font-size:15px;
}

.name-input{
  text-align:left;
  font-weight:bold;
}

input:disabled{
  background:#f8fafc;
  color:#334155;
}

.note{
  text-align:center;
  color:#64748b;
  font-size:13px;
  margin-top:10px;
}

.lottery-box{
  margin-top:16px;
  display:none;
}

.lottery-title{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:#7c2d12;
  text-shadow:2px 2px 0 #fff;
  margin-bottom:12px;
}

.wheel-area{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:24px;
}

.wheel-wrap{
  position:relative;
  width:520px;
  max-width:92vw;
  aspect-ratio:1/1;
}

#wheelCanvas{
  width:100%;
  height:100%;
  border-radius:50%;
  border:8px solid #8b5e34;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:22px solid transparent;
  border-right:22px solid transparent;
  border-top:42px solid #ef4444;
  z-index:5;
}

.wheel-center{
  position:absolute;
  inset:50%;
  transform:translate(-50%,-50%);
  width:105px;
  height:105px;
  border-radius:50%;
  background:linear-gradient(#fff7ed,#fdba74);
  border:5px solid #8b5e34;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#7c2d12;
}

.winner-card{
  min-width:280px;
  max-width:380px;
  background:#fff7ed;
  border:4px solid #8b5e34;
  border-radius:18px;
  padding:18px;
  text-align:center;
}

.winner-name{
  font-size:32px;
  font-weight:bold;
  color:#dc2626;
  margin:12px 0;
}

.history{
  margin-top:14px;
  max-height:220px;
  overflow:auto;
  text-align:left;
  background:white;
  border:2px dashed #fdba74;
  border-radius:12px;
  padding:10px;
}

.history div{
  padding:5px 0;
  border-bottom:1px solid #fed7aa;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:linear-gradient(#fff7ed,#ffedd5);
  border:5px solid #8b5e34;
  border-radius:24px;
  padding:28px;
  max-width:90vw;
  text-align:center;
}

.modal-content h2{
  font-size:34px;
  color:#dc2626;
}

.modal-content .bigwinner{
  font-size:42px;
  font-weight:bold;
  color:#7e22ce;
  margin:12px 0;
}
</style>
</head>

<body>

<h1>🍁 楓谷風票數統計抽獎工具 🍁</h1>
<div class="subtitle">票數越高，中獎率越高</div>

<div class="status" id="modeText">讀取中...</div>

<div class="toolbar">
  <button class="blue-btn" onclick="loginEdit()" id="loginBtn">進入編輯模式</button>
  <button class="blue-btn" onclick="logoutEdit()" id="logoutBtn" style="display:none;">離開編輯模式</button>
  <button onclick="addDate()" id="addDateBtn" disabled>新增日期</button>
  <button onclick="addPerson()" id="addPersonBtn" disabled>新增人物</button>
  <button class="green-btn" onclick="toggleLottery()">開啟/關閉轉盤</button>
  <button class="purple-btn" onclick="exportCSV()">匯出 CSV</button>
  <button class="red-btn" onclick="clearData()" id="clearBtn" disabled>清空資料</button>
</div>

<div class="panel">

<div class="summary">
  <div class="badge">總票數：<span id="grandTotalText">0</span></div>
  <div class="badge">有效抽獎人數：<span id="validCountText">0</span></div>
</div>

<div class="table-wrap">
  <table id="voteTable"></table>
</div>

<div class="note">
左側人物固定，右側可水平捲動。
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAFx2x9ICrWgXWXiSSyt1_vW40j1v1JSA",
  authDomain: "vote-tracker-7ead2.firebaseapp.com",
  databaseURL: "https://vote-tracker-7ead2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vote-tracker-7ead2",
  storageBucket: "vote-tracker-7ead2.firebasestorage.app",
  messagingSenderId: "788601350797",
  appId: "1:788601350797:web:4cb65f367cc0430dc250c4"
};

const EDIT_PASSWORD = "NM4DJ";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db,"voteTracker/main");

let isEditMode = sessionStorage.getItem("vote_edit_mode") === "true";
let dates = ["5/10"];
let people = ["人物A"];
let votes = {};
let history = [];

function voteKey(person,date){
  return person + "|||" + date;
}

function getVote(person,date){
  return Number(votes[voteKey(person,date)] || 0);
}

function getPersonTotal(person){
  return dates.reduce((sum,date)=>sum + getVote(person,date),0);
}

function getGrandTotal(){
  return people.reduce((sum,p)=>sum + getPersonTotal(p),0);
}

function getRate(person){
  const grand = getGrandTotal();
  if(grand <= 0) return 0;
  return getPersonTotal(person) / grand * 100;
}

function updateMode(){

  document.getElementById("modeText").innerHTML =
    isEditMode
      ? "<span class='editing'>目前狀態：編輯模式</span>"
      : "<span class='readonly'>目前狀態：唯讀模式</span>";

  document.getElementById("loginBtn").style.display =
    isEditMode ? "none" : "inline-block";

  document.getElementById("logoutBtn").style.display =
    isEditMode ? "inline-block" : "none";

  document.getElementById("addDateBtn").disabled = !isEditMode;
  document.getElementById("addPersonBtn").disabled = !isEditMode;
  document.getElementById("clearBtn").disabled = !isEditMode;
}

async function saveData(){

  if(!isEditMode) return;

  await set(dataRef,{
    dates,
    people,
    votes,
    history
  });

  renderAll();
}

onValue(dataRef,(snapshot)=>{

  const data = snapshot.val();

  if(data){
    dates = data.dates || [];
    people = data.people || [];
    votes = data.votes || {};
    history = data.history || [];
  }

  renderAll();
});

window.loginEdit = function(){

  const pwd = prompt("請輸入編輯密碼");

  if(pwd === null) return;

  if(pwd === EDIT_PASSWORD){

    isEditMode = true;

    sessionStorage.setItem("vote_edit_mode","true");

    renderAll();

  }else{
    alert("密碼錯誤");
  }
};

window.logoutEdit = async function(){

  document.querySelectorAll(".vote-edit").forEach(input=>{

    const person = people[Number(input.dataset.personIndex)];
    const date = dates[Number(input.dataset.dateIndex)];

    votes[voteKey(person,date)] = Number(input.value) || 0;

  });

  await set(dataRef,{
    dates,
    people,
    votes,
    history
  });

  isEditMode = false;

  sessionStorage.removeItem("vote_edit_mode");

  renderAll();
};

window.addDate = async function(){

  if(!isEditMode) return;

  const newDate = prompt("請輸入日期");

  if(!newDate) return;

  dates.push(newDate);

  await saveData();
};

window.addPerson = async function(){

  if(!isEditMode) return;

  const newPerson = prompt("請輸入人物名稱");

  if(!newPerson) return;

  people.push(newPerson);

  await saveData();
};

window.clearData = async function(){

  if(!isEditMode) return;

  if(!confirm("確定清空?")) return;

  votes = {};

  await saveData();
};

function calcNameWidth(){

  let maxLen = 4;

  people.forEach(name=>{
    maxLen = Math.max(maxLen,String(name).length);
  });

  const width = Math.min(Math.max(maxLen * 18 + 70,180),420);

  document.documentElement
    .style
    .setProperty("--name-col-width",width + "px");
}

function renderAll(){

  updateMode();

  renderTable();

  document.getElementById("grandTotalText").textContent =
    getGrandTotal();

  document.getElementById("validCountText").textContent =
    people.filter(p=>getPersonTotal(p) > 0).length;
}

function renderTable(){

  calcNameWidth();

  const table = document.getElementById("voteTable");

  let html = "";

  html += "<tr>";
  html += "<th class='name-col'>人物名稱</th>";

  dates.forEach((date,index)=>{

    html += `
      <th>
        <input
          value="${escapeHtml(date)}"
          class="date-edit"
          data-index="${index}"
          ${isEditMode ? "" : "disabled"}
        >
      </th>
    `;
  });

  html += "<th class='total-col'>人物總票數</th>";
  html += "<th class='rate-col'>中獎率</th>";
  html += "<th class='scroll-spacer'></th>";
  html += "</tr>";

  people.forEach((person,pIndex)=>{

    html += "<tr>";

    html += `
      <td class="name-col">
        <input
          class="name-input person-edit"
          value="${escapeHtml(person)}"
          data-index="${pIndex}"
          ${isEditMode ? "" : "disabled"}
        >
      </td>
    `;

    dates.forEach((date,dIndex)=>{

      html += `
        <td>
          <input
            type="number"
            class="vote-edit"
            data-person-index="${pIndex}"
            data-date-index="${dIndex}"
            value="${getVote(person,date)}"
            ${isEditMode ? "" : "disabled"}
          >
        </td>
      `;
    });

    html += `<td class="total-col">${getPersonTotal(person)}</td>`;
    html += `<td class="rate-col">${getRate(person).toFixed(2)}%</td>`;
    html += "<td class='scroll-spacer'></td>";

    html += "</tr>";
  });

  table.innerHTML = html;

  document.querySelectorAll(".vote-edit").forEach(input=>{

    input.addEventListener("input",()=>{

      const person = people[Number(input.dataset.personIndex)];
      const date = dates[Number(input.dataset.dateIndex)];

      votes[voteKey(person,date)] = Number(input.value) || 0;
    });

    input.addEventListener("change",()=>{

      const person = people[Number(input.dataset.personIndex)];
      const date = dates[Number(input.dataset.dateIndex)];

      votes[voteKey(person,date)] = Number(input.value) || 0;

      saveData();
    });
  });
}

function escapeHtml(text){

  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

renderAll();
</script>

</body>
</html>
