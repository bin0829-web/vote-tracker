<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>票數統計工具</title>

<style>
:root{
  --name-col-width: 180px;
  --vote-col-width: 135px;
}

body{
  font-family:"Microsoft JhengHei",sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:20px;
  color:#222;
}

h1{text-align:center}

.toolbar{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:16px;
}

button{
  border:0;
  background:#2563eb;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

button:hover{background:#1d4ed8}
button:disabled{background:#9ca3af;cursor:not-allowed}
.danger{background:#dc2626}

.status{
  text-align:center;
  margin-bottom:12px;
  font-weight:bold;
}

.readonly{color:#dc2626}
.editing{color:#16a34a}

.table-wrap{
  overflow:auto;
  background:white;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:0;
  max-height:75vh;
  border:1px solid #d1d5db;
  position:relative;
}

table{
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
  width:max-content;
  min-width:100%;
}

th,td{
  border-right:1px solid #d1d5db;
  border-bottom:1px solid #d1d5db;
  padding:8px;
  text-align:center;
  min-width:var(--vote-col-width);
  width:var(--vote-col-width);
  background:white;
}

th{
  background:#e0ecff;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:3;
}

.name-col{
  position:sticky;
  left:0;
  z-index:10;
  min-width:var(--name-col-width);
  width:var(--name-col-width);
  background:#fef3c7 !important;
  font-weight:bold;
  box-shadow:4px 0 8px rgba(0,0,0,.18);
}

th.name-col{
  z-index:6;
}

.total-col{
  background:#dcfce7;
  font-weight:bold;
}

.total-row td{
  background:#fee2e2;
  font-weight:bold;
}

.total-row .name-col{
  background:#fecaca;
}

input{
  box-sizing:border-box;
  width:100%;
  padding:6px;
  text-align:center;
  border:1px solid #cbd5e1;
  border-radius:6px;
  font-size:15px;
}

.name-input{
  text-align:left;
  font-weight:bold;
}

.date-input{
  font-weight:bold;
}

input:disabled{
  background:#f8fafc;
  color:#334155;
}

.note{
  text-align:center;
  color:#64748b;
  font-size:13px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>票數統計工具</h1>

<div class="status" id="modeText">讀取中...</div>

<div class="toolbar">
  <button onclick="loginEdit()" id="loginBtn">進入編輯模式</button>
  <button onclick="logoutEdit()" id="logoutBtn" style="display:none;">離開編輯模式</button>
  <button onclick="addDate()" id="addDateBtn" disabled>新增日期</button>
  <button onclick="addPerson()" id="addPersonBtn" disabled>新增人物</button>
  <button onclick="exportCSV()">匯出 CSV</button>
  <button class="danger" onclick="clearData()" id="clearBtn" disabled>清空資料</button>
</div>

<div class="table-wrap">
  <table id="voteTable"></table>
</div>

<div class="note">
  左側人物名稱已固定，可左右拖曳下方捲軸查看日期票數。
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAFx2x9ICrWgXWXiSSyt1_vW40j1v1JSA",
  authDomain: "vote-tracker-7ead2.firebaseapp.com",
  databaseURL: "https://vote-tracker-7ead2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vote-tracker-7ead2",
  storageBucket: "vote-tracker-7ead2.firebasestorage.app",
  messagingSenderId: "788601350797",
  appId: "1:788601350797:web:4cb65f367cc0430dc250c4"
};

const EDIT_PASSWORD = "NM4DJ";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, "voteTracker/main");

let isEditMode = sessionStorage.getItem("vote_edit_mode") === "true";
let dates = ["5/10"];
let people = ["人物A", "人物B"];
let votes = {};

function voteKey(person, date){
  return person + "|||" + date;
}

function oldVoteKey(person, date){
  return person + "_" + date;
}

function getVote(person, date){
  return Number(votes[voteKey(person,date)] ?? votes[oldVoteKey(person,date)] ?? 0);
}

function updateMode(){
  document.getElementById("modeText").innerHTML = isEditMode
    ? "<span class='editing'>目前狀態：編輯模式</span>"
    : "<span class='readonly'>目前狀態：唯讀模式</span>";

  document.getElementById("loginBtn").style.display = isEditMode ? "none" : "inline-block";
  document.getElementById("logoutBtn").style.display = isEditMode ? "inline-block" : "none";

  document.getElementById("addDateBtn").disabled = !isEditMode;
  document.getElementById("addPersonBtn").disabled = !isEditMode;
  document.getElementById("clearBtn").disabled = !isEditMode;
}

function saveData(){
  if(!isEditMode) return;
  renderTable();
  set(dataRef,{dates,people,votes});
}

onValue(dataRef, snapshot=>{
  const data = snapshot.val();

  if(data){
    dates = data.dates || [];
    people = data.people || [];
    votes = data.votes || {};
  }

  updateMode();
  renderTable();
});

window.loginEdit = function(){
  const pwd = prompt("請輸入編輯密碼");

  if(pwd === null) return;

  if(pwd === EDIT_PASSWORD){
    isEditMode = true;
    sessionStorage.setItem("vote_edit_mode","true");
    updateMode();
    renderTable();
  }else{
    alert("密碼錯誤");
  }
};

window.logoutEdit = function(){
  isEditMode = false;
  sessionStorage.removeItem("vote_edit_mode");
  updateMode();
  renderTable();
};

window.addDate = function(){
  if(!isEditMode) return;

  const newDate = prompt("請輸入日期，例如：5/11");
  if(!newDate) return;

  if(dates.includes(newDate)){
    alert("這個日期已經存在");
    return;
  }

  dates.push(newDate);
  saveData();
};

window.addPerson = function(){
  if(!isEditMode) return;

  const newPerson = prompt("請輸入人物名稱");
  if(!newPerson) return;

  if(people.includes(newPerson)){
    alert("這個人物已經存在");
    return;
  }

  people.push(newPerson);
  saveData();
};

window.clearData = function(){
  if(!isEditMode) return;
  if(!confirm("確定要清空所有資料嗎？")) return;

  dates = ["5/10"];
  people = ["人物A","人物B"];
  votes = {};
  saveData();
};

window.exportCSV = function(){
  let csv = "人物名稱," + dates.join(",") + ",人物總票數\n";

  people.forEach(person=>{
    let row = [person];
    let total = 0;

    dates.forEach(date=>{
      const value = getVote(person,date);
      row.push(value);
      total += value;
    });

    row.push(total);
    csv += row.join(",") + "\n";
  });

  let totalRow = ["每日總票數"];
  let grandTotal = 0;

  dates.forEach(date=>{
    let dateTotal = 0;
    people.forEach(person=>dateTotal += getVote(person,date));
    totalRow.push(dateTotal);
    grandTotal += dateTotal;
  });

  totalRow.push(grandTotal);
  csv += totalRow.join(",");

  const blob = new Blob(["\uFEFF" + csv],{type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "票數統計.csv";
  link.click();
};

function renameDate(index,newName){
  if(!isEditMode) return;

  newName = newName.trim();
  if(!newName){
    renderTable();
    return;
  }

  const oldName = dates[index];
  dates[index] = newName;

  const newVotes = {};

  Object.keys(votes).forEach(key=>{
    if(key.includes("|||")){
      const [person,date] = key.split("|||");
      newVotes[voteKey(person,date === oldName ? newName : date)] = votes[key];
    }else{
      newVotes[key.replace("_" + oldName,"_" + newName)] = votes[key];
    }
  });

  votes = newVotes;
  saveData();
}

function renamePerson(index,newName){
  if(!isEditMode) return;

  newName = newName.trim();
  if(!newName){
    renderTable();
    return;
  }

  const oldName = people[index];
  people[index] = newName;

  const newVotes = {};

  Object.keys(votes).forEach(key=>{
    if(key.includes("|||")){
      const [person,date] = key.split("|||");
      newVotes[voteKey(person === oldName ? newName : person,date)] = votes[key];
    }else{
      newVotes[key.replace(oldName + "_",newName + "_")] = votes[key];
    }
  });

  votes = newVotes;
  saveData();
}

function setVote(personIndex,dateIndex,value){
  if(!isEditMode) return;

  const person = people[personIndex];
  const date = dates[dateIndex];

  votes[voteKey(person,date)] = Number(value) || 0;
  saveData();
}

function calcNameWidth(){
  let maxLen = 4;

  people.forEach(name=>{
    maxLen = Math.max(maxLen, String(name).length);
  });

  const width = Math.min(Math.max(maxLen * 18 + 70, 180), 420);
  document.documentElement.style.setProperty("--name-col-width", width + "px");
}

function renderTable(){
  calcNameWidth();

  const table = document.getElementById("voteTable");
  let html = "";

  html += "<tr>";
  html += "<th class='name-col'>人物名稱</th>";

  dates.forEach((date,index)=>{
    html += `
      <th>
        <input class="date-input date-edit" data-index="${index}" value="${escapeHtml(date)}" ${isEditMode ? "" : "disabled"}>
      </th>
    `;
  });

  html += "<th class='total-col'>人物總票數</th>";
  html += "</tr>";

  people.forEach((person,pIndex)=>{
    let personTotal = 0;

    html += "<tr>";
    html += `
      <td class="name-col">
        <input class="name-input person-edit" data-index="${pIndex}" value="${escapeHtml(person)}" ${isEditMode ? "" : "disabled"}>
      </td>
    `;

    dates.forEach((date,dIndex)=>{
      const value = getVote(person,date);
      personTotal += value;

      html += `
        <td>
          <input type="number" min="0" class="vote-edit"
            data-person-index="${pIndex}"
            data-date-index="${dIndex}"
            value="${value}"
            ${isEditMode ? "" : "disabled"}>
        </td>
      `;
    });

    html += `<td class="total-col">${personTotal}</td>`;
    html += "</tr>";
  });

  html += "<tr class='total-row'>";
  html += "<td class='name-col'>每日總票數</td>";

  let grandTotal = 0;

  dates.forEach(date=>{
    let dateTotal = 0;
    people.forEach(person=>dateTotal += getVote(person,date));
    grandTotal += dateTotal;
    html += `<td>${dateTotal}</td>`;
  });

  html += `<td>${grandTotal}</td>`;
  html += "</tr>";

  table.innerHTML = html;

  document.querySelectorAll(".date-edit").forEach(input=>{
    input.addEventListener("change",()=>{
      renameDate(Number(input.dataset.index),input.value);
    });
  });

  document.querySelectorAll(".person-edit").forEach(input=>{
    input.addEventListener("change",()=>{
      renamePerson(Number(input.dataset.index),input.value);
    });
  });

  document.querySelectorAll(".vote-edit").forEach(input=>{
    input.addEventListener("change",()=>{
      setVote(
        Number(input.dataset.personIndex),
        Number(input.dataset.dateIndex),
        input.value
      );
    });
  });
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

updateMode();
renderTable();
</script>

</body>
</html>
