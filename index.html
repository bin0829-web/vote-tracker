<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楓谷公會硬幣捐贈統計抽獎工具</title>

<style>
:root{
  --name-col-width:180px;
  --vote-col-width:135px;
}

*{box-sizing:border-box}

body{
  font-family:"Microsoft JhengHei",sans-serif;
  margin:0;
  padding:20px;
  color:#374151;
  overflow-x:hidden;
  background:
    radial-gradient(circle at 15% 15%, #ffffff 0 4%, transparent 5%),
    radial-gradient(circle at 80% 12%, #ffffff 0 5%, transparent 6%),
    linear-gradient(180deg,#bde7ff 0%,#e9f8ff 45%,#fff4c7 100%);
  min-height:100vh;
}

h1{
  text-align:center;
  margin:8px 0 6px;
  color:#4b5563;
  text-shadow:2px 2px 0 #fff;
}

.subtitle{
  text-align:center;
  font-weight:bold;
  color:#f97316;
  margin-bottom:10px;
}

.toolbar{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:16px;
}

button{
  border:3px solid #8b5e34;
  background:linear-gradient(#ffe38a,#f59e0b);
  color:#4b2e13;
  padding:8px 14px;
  border-radius:14px;
  cursor:pointer;
  font-size:15px;
  font-weight:bold;
  box-shadow:0 4px 0 #8b5e34,0 6px 12px rgba(0,0,0,.15);
}

button:hover{filter:brightness(1.05)}
button:active{transform:translateY(3px);box-shadow:0 1px 0 #8b5e34}
button:disabled{
  background:#cbd5e1;
  color:#64748b;
  border-color:#94a3b8;
  box-shadow:none;
  cursor:not-allowed;
}

.blue-btn{background:linear-gradient(#93c5fd,#3b82f6);color:#fff}
.red-btn{background:linear-gradient(#fca5a5,#ef4444);color:#fff}
.green-btn{background:linear-gradient(#86efac,#22c55e);color:#064e3b}
.purple-btn{background:linear-gradient(#d8b4fe,#a855f7);color:#fff}

.status{
  text-align:center;
  margin-bottom:12px;
  font-weight:bold;
}

.readonly{color:#dc2626}
.editing{color:#16a34a}
.saving{color:#2563eb}
.lottery-on{color:#7e22ce}

.panel{
  background:rgba(255,255,255,.72);
  border:3px solid #8b5e34;
  border-radius:18px;
  padding:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.summary{
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:12px;
  font-weight:bold;
}

.badge{
  background:#fff7ed;
  border:2px solid #fdba74;
  color:#9a3412;
  padding:6px 12px;
  border-radius:999px;
}

.table-wrap{
  overflow:auto;
  background:white;
  border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);
  padding:0;
  max-height:66vh;
  border:3px solid #8b5e34;
  position:relative;
  width:100%;
}

table{
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
  width:max-content;
}

th,td{
  border-right:1px solid #d1d5db;
  border-bottom:1px solid #d1d5db;
  padding:8px;
  text-align:center;
  min-width:var(--vote-col-width);
  width:var(--vote-col-width);
  background:white;
}

th{
  background:#e0f2fe;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:3;
}

.name-col{
  position:sticky;
  left:0;
  z-index:10;
  min-width:var(--name-col-width);
  width:var(--name-col-width);
  background:#fef3c7 !important;
  font-weight:bold;
  box-shadow:4px 0 8px rgba(0,0,0,.18);
}

th.name-col{z-index:20}

.meta-row td{
  background:#fff7ed;
  font-weight:bold;
}

.meta-label{
  background:#fed7aa !important;
  color:#9a3412;
}

.total-col{
  background:#dcfce7;
  font-weight:bold;
}

.rate-col{
  background:#f3e8ff;
  font-weight:bold;
  color:#7e22ce;
}

.income-total-col{
  background:#fef9c3;
  font-weight:bold;
  color:#854d0e;
}

.total-row td{
  background:#fee2e2;
  font-weight:bold;
}

.total-row .name-col{
  background:#fecaca !important;
}

.scroll-spacer{
  min-width:calc(100vw - var(--name-col-width) - var(--vote-col-width) * 3 - 60px);
  width:calc(100vw - var(--name-col-width) - var(--vote-col-width) * 3 - 60px);
  border-right:0;
  background:transparent !important;
  pointer-events:none;
}

input, select{
  width:100%;
  padding:6px;
  text-align:center;
  border:1px solid #cbd5e1;
  border-radius:8px;
  font-size:15px;
  background:white;
}

.name-input{
  text-align:left;
  font-weight:bold;
}

input:disabled{
  background:#f8fafc;
  color:#334155;
}

.note{
  text-align:center;
  color:#64748b;
  font-size:13px;
  margin-top:10px;
}

.lottery-box{
  margin-top:16px;
  display:none;
}

.lottery-title{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  color:#7c2d12;
  text-shadow:2px 2px 0 #fff;
  margin-bottom:12px;
}

.lottery-settings{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
  font-weight:bold;
}

.lottery-settings input[type="number"]{
  width:90px;
}

.check-wrap{
  display:flex;
  align-items:center;
  gap:6px;
  background:#fff7ed;
  border:2px solid #fdba74;
  padding:6px 10px;
  border-radius:999px;
}

.check-wrap input{
  width:auto;
}

.wheel-area{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:24px;
}

.wheel-wrap{
  position:relative;
  width:520px;
  max-width:92vw;
  aspect-ratio:1/1;
}

#wheelCanvas{
  width:100%;
  height:100%;
  border-radius:50%;
  border:8px solid #8b5e34;
  background:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:22px solid transparent;
  border-right:22px solid transparent;
  border-top:42px solid #ef4444;
  z-index:5;
}

.wheel-center{
  position:absolute;
  inset:50%;
  transform:translate(-50%,-50%);
  width:105px;
  height:105px;
  border-radius:50%;
  background:linear-gradient(#fff7ed,#fdba74);
  border:5px solid #8b5e34;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#7c2d12;
}

.winner-card{
  min-width:320px;
  max-width:460px;
  background:#fff7ed;
  border:4px solid #8b5e34;
  border-radius:18px;
  padding:18px;
  text-align:center;
}

.winner-name{
  font-size:32px;
  font-weight:bold;
  color:#dc2626;
  margin:12px 0;
}

.result-list{
  margin-top:10px;
  text-align:left;
  background:#fff;
  border:2px solid #fdba74;
  border-radius:12px;
  padding:10px;
  max-height:260px;
  overflow:auto;
}

.result-list div{
  padding:6px 0;
  border-bottom:1px solid #fed7aa;
}

.history{
  margin-top:14px;
  max-height:260px;
  overflow:auto;
  text-align:left;
  background:white;
  border:2px dashed #fdba74;
  border-radius:12px;
  padding:10px;
}

.history div{
  padding:5px 0;
  border-bottom:1px solid #fed7aa;
}

.verify{
  display:block;
  margin-top:4px;
  font-size:12px;
  color:#64748b;
  word-break:break-all;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:linear-gradient(#fff7ed,#ffedd5);
  border:5px solid #8b5e34;
  border-radius:24px;
  padding:28px;
  max-width:92vw;
  max-height:88vh;
  overflow:auto;
  text-align:center;
}

.modal-content h2{
  font-size:34px;
  color:#dc2626;
  margin:0 0 10px;
}

.modal-content .bigwinner{
  font-size:30px;
  font-weight:bold;
  color:#7e22ce;
  margin:12px 0;
  line-height:1.6;
}

@media(max-width:768px){
  body{padding:10px}
  .table-wrap{max-height:60vh}
  .wheel-wrap{width:360px}
}
</style>
</head>

<body>

<h1>🍁 楓谷公會硬幣捐贈統計抽獎工具 🍁</h1>
<div class="subtitle">票數越高，中獎率越高｜個人總所得＝每日個人所得 × 當日個人票數</div>

<div class="status" id="modeText">讀取中...</div>

<div class="toolbar">
  <button class="blue-btn" onclick="loginEdit()" id="loginBtn">進入編輯模式</button>
  <button class="blue-btn" onclick="logoutEdit()" id="logoutBtn" style="display:none;">離開編輯模式</button>
  <button onclick="addDate()" id="addDateBtn" disabled>新增日期</button>
  <button onclick="addPerson()" id="addPersonBtn" disabled>新增人物</button>
  <button class="green-btn" onclick="unlockLottery()" id="lotteryBtn">開啟轉盤</button>
  <button class="purple-btn" onclick="exportCSV()">匯出 CSV</button>
  <button class="red-btn" onclick="clearData()" id="clearBtn" disabled>清空資料</button>
</div>

<div class="panel">
  <div class="summary">
    <div class="badge">總票數：<span id="grandTotalText">0</span></div>
    <div class="badge">有效抽獎人數：<span id="validCountText">0</span></div>
    <div class="badge">個人總所得合計：<span id="allIncomeText">0</span></div>
  </div>

  <div class="table-wrap">
    <table id="voteTable"></table>
  </div>

  <div class="note">
    左側人物名稱固定，右側可水平捲動。日期下方可輸入「捐贈所得」與「個人所得」。
  </div>
</div>

<div class="lottery-box panel" id="lotteryBox">
  <div class="lottery-title">🍄 楓谷幸運轉盤 🍄</div>

  <div class="lottery-settings">
    <label>抽取數量：</label>
    <input type="number" id="drawCountInput" min="1" value="1">
    <label class="check-wrap">
      <input type="checkbox" id="noRepeatCheck" checked>
      不重複中獎
    </label>
  </div>

  <div class="toolbar">
    <button class="green-btn" onclick="startLottery()" id="startLotteryBtn">開始抽獎</button>
    <button class="red-btn" onclick="clearHistory()" id="clearHistoryBtn">清除抽獎紀錄</button>
    <button class="blue-btn" onclick="lockLottery()">關閉轉盤</button>
  </div>

  <div class="wheel-area">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="800" height="800"></canvas>
      <div class="wheel-center">LUCKY</div>
    </div>

    <div class="winner-card">
      <div>本次抽獎結果</div>
      <div class="winner-name" id="winnerName">尚未抽獎</div>
      <div id="winnerInfo">請設定抽取數量後開始抽獎</div>

      <div class="result-list" id="batchResultBox">尚無本次結果</div>

      <h3>抽獎紀錄</h3>
      <div class="history" id="historyBox">尚無紀錄</div>
    </div>
  </div>
</div>

<div class="modal" id="winnerModal">
  <div class="modal-content">
    <h2>🎉 恭喜中獎 🎉</h2>
    <div class="bigwinner" id="modalWinner">---</div>
    <div id="modalWinnerInfo"></div>
    <br>
    <button onclick="closeWinnerModal()">確認</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAFx2x9ICrWgXWXiSSyt1_vW40j1v1JSA",
  authDomain: "vote-tracker-7ead2.firebaseapp.com",
  databaseURL: "https://vote-tracker-7ead2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vote-tracker-7ead2",
  storageBucket: "vote-tracker-7ead2.firebasestorage.app",
  messagingSenderId: "788601350797",
  appId: "1:788601350797:web:4cb65f367cc0430dc250c4"
};

const EDIT_PASSWORD = "NM4DJ1993";
const LOTTERY_PASSWORD = "NM4DJ2026";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, "voteTracker/main");

let isEditMode = false;
let isLotteryUnlocked = false;
let isSaving = false;
let isSpinning = false;

let dates = ["5/10"];
let people = ["人物A", "人物B"];
let votes = {};
let dateIncome = {};
let history = [];
let wheelRotation = 0;
let wheelOverrideList = null;

function safeKey(text){
  return btoa(unescape(encodeURIComponent(String(text))))
    .replaceAll("+","-")
    .replaceAll("/","_")
    .replaceAll("=","");
}

function voteKey(person, date){
  return safeKey(person) + "___" + safeKey(date);
}

function incomeKey(date){
  return safeKey(date);
}

function getVote(person, date){
  return Number(votes[voteKey(person,date)] ?? 0);
}

function getDateIncome(date, type){
  const key = incomeKey(date);
  return Number(dateIncome[key]?.[type] ?? 0);
}

function setDateIncome(date, type, value){
  const key = incomeKey(date);
  if(!dateIncome[key]) dateIncome[key] = {};
  dateIncome[key][type] = Number(value) || 0;
}

function getPersonTotal(person){
  return dates.reduce((sum,date)=>sum + getVote(person,date),0);
}

function getGrandTotal(){
  return people.reduce((sum,person)=>sum + getPersonTotal(person),0);
}

function getRate(person){
  const grand = getGrandTotal();
  if(grand <= 0) return 0;
  return getPersonTotal(person) / grand * 100;
}

function getPersonIncomeTotal(person){
  return dates.reduce((sum,date)=>{
    return sum + getVote(person,date) * getDateIncome(date,"personalIncome");
  },0);
}

function getAllIncomeTotal(){
  return people.reduce((sum,person)=>sum + getPersonIncomeTotal(person),0);
}

function getLotteryList(excludedNames = []){
  return people
    .filter(person=>!excludedNames.includes(person))
    .map(person=>({
      name:person,
      total:getPersonTotal(person),
      rate:getRate(person)
    }))
    .filter(item=>item.total > 0);
}

function getCurrentWheelList(){
  return wheelOverrideList || getLotteryList();
}

function getCryptoRandomUnit(){
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] / 4294967296;
}

async function sha256(text){
  const buffer = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", buffer);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b=>b.toString(16).padStart(2,"0"))
    .join("");
}

function scanInputsToMemory(){
  document.querySelectorAll(".vote-edit").forEach(input=>{
    const person = people[Number(input.dataset.personIndex)];
    const date = dates[Number(input.dataset.dateIndex)];
    if(person && date){
      votes[voteKey(person,date)] = Number(input.value) || 0;
    }
  });

  document.querySelectorAll(".income-edit").forEach(input=>{
    const date = dates[Number(input.dataset.dateIndex)];
    const type = input.dataset.type;
    if(date && type){
      setDateIncome(date,type,input.value);
    }
  });
}

function updateMode(){
  const modeText = document.getElementById("modeText");

  if(isSaving){
    modeText.innerHTML = "<span class='saving'>資料儲存中...</span>";
  }else if(isEditMode && isLotteryUnlocked){
    modeText.innerHTML = "<span class='editing'>目前狀態：編輯模式</span>　<span class='lottery-on'>轉盤已解鎖</span>";
  }else if(isEditMode){
    modeText.innerHTML = "<span class='editing'>目前狀態：編輯模式</span>";
  }else if(isLotteryUnlocked){
    modeText.innerHTML = "<span class='readonly'>目前狀態：唯讀模式</span>　<span class='lottery-on'>轉盤已解鎖</span>";
  }else{
    modeText.innerHTML = "<span class='readonly'>目前狀態：唯讀模式</span>";
  }

  document.getElementById("loginBtn").style.display = isEditMode ? "none" : "inline-block";
  document.getElementById("logoutBtn").style.display = isEditMode ? "inline-block" : "none";

  document.getElementById("addDateBtn").disabled = !isEditMode || isSaving;
  document.getElementById("addPersonBtn").disabled = !isEditMode || isSaving;
  document.getElementById("clearBtn").disabled = !isEditMode || isSaving;

  const lotteryBtn = document.getElementById("lotteryBtn");
  lotteryBtn.textContent = isLotteryUnlocked ? "轉盤已開啟" : "開啟轉盤";
}

async function saveToFirebase(){
  scanInputsToMemory();

  isSaving = true;
  updateMode();

  try{
    await set(dataRef,{
      dates,
      people,
      votes,
      dateIncome,
      history,
      updatedAt:new Date().toISOString()
    });
  }catch(err){
    console.error(err);
    alert("資料沒有成功寫入 Firebase。請確認 Realtime Database Rules 是否允許寫入。");
  }finally{
    isSaving = false;
    updateMode();
  }
}

onValue(dataRef, snapshot=>{
  const data = snapshot.val();

  if(data){
    dates = data.dates || [];
    people = data.people || [];
    votes = data.votes || {};
    dateIncome = data.dateIncome || {};
    history = data.history || [];
  }

  renderAll();
});

window.loginEdit = function(){
  const pwd = prompt("請輸入編輯密碼");
  if(pwd === null) return;

  if(pwd === EDIT_PASSWORD){
    isEditMode = true;
    renderAll();
  }else{
    alert("密碼錯誤");
  }
};

window.logoutEdit = async function(){
  scanInputsToMemory();
  await saveToFirebase();

  isEditMode = false;
  isSaving = false;

  renderAll();
};

window.unlockLottery = function(){
  if(isLotteryUnlocked){
    document.getElementById("lotteryBox").style.display = "block";
    drawWheel();
    return;
  }

  const pwd = prompt("請輸入轉盤密碼");
  if(pwd === null) return;

  if(pwd === LOTTERY_PASSWORD){
    isLotteryUnlocked = true;
    document.getElementById("lotteryBox").style.display = "block";
    renderAll();
  }else{
    alert("轉盤密碼錯誤");
  }
};

window.lockLottery = function(){
  isLotteryUnlocked = false;
  document.getElementById("lotteryBox").style.display = "none";
  renderAll();
};

window.addDate = async function(){
  if(!isEditMode) return;

  const newDate = prompt("請輸入日期，例如：5/11");
  if(!newDate) return;

  const cleanDate = newDate.trim();
  if(!cleanDate) return;

  if(dates.includes(cleanDate)){
    alert("這個日期已經存在");
    return;
  }

  dates.push(cleanDate);
  renderAll();
  await saveToFirebase();
};

window.addPerson = async function(){
  if(!isEditMode) return;

  const newPerson = prompt("請輸入人物名稱");
  if(!newPerson) return;

  const cleanPerson = newPerson.trim();
  if(!cleanPerson) return;

  if(people.includes(cleanPerson)){
    alert("這個人物已經存在");
    return;
  }

  people.push(cleanPerson);
  renderAll();
  await saveToFirebase();
};

window.clearData = async function(){
  if(!isEditMode) return;
  if(!confirm("確定要清空所有票數與所得資料嗎？")) return;

  dates = ["5/10"];
  people = ["人物A","人物B"];
  votes = {};
  dateIncome = {};
  history = [];

  renderAll();
  await saveToFirebase();
};

window.clearHistory = async function(){
  if(!isLotteryUnlocked) return alert("請先輸入轉盤密碼。");
  if(!confirm("確定清除抽獎紀錄嗎？")) return;

  history = [];
  renderAll();
  await saveToFirebase();
};

window.startLottery = async function(){
  if(!isLotteryUnlocked) return alert("請先輸入轉盤密碼。");
  if(isSpinning) return;

  scanInputsToMemory();

  const drawCountInput = document.getElementById("drawCountInput");
  const noRepeat = document.getElementById("noRepeatCheck").checked;
  let drawCount = Number(drawCountInput.value) || 1;

  const initialList = getLotteryList();
  if(initialList.length === 0){
    alert("目前沒有可抽獎的人物，請先輸入票數。");
    return;
  }

  if(noRepeat && drawCount > initialList.length){
    drawCount = initialList.length;
    drawCountInput.value = drawCount;
    alert("抽取數量超過有效人數，已自動調整為有效人數上限。");
  }

  document.getElementById("startLotteryBtn").disabled = true;
  document.getElementById("batchResultBox").innerHTML = "抽獎進行中...";
  document.getElementById("winnerName").textContent = "抽獎中...";
  document.getElementById("winnerInfo").textContent = "";

  const excluded = [];
  const results = [];
  const batchTime = new Date().toLocaleString("zh-TW");
  const batchId = Date.now().toString();

  for(let i=1;i<=drawCount;i++){
    const list = getLotteryList(noRepeat ? excluded : []);
    const roundTotal = list.reduce((sum,item)=>sum + item.total,0);

    if(list.length === 0 || roundTotal <= 0) break;

    const randomUnit = getCryptoRandomUnit();
    const randomValue = randomUnit * roundTotal;

    let acc = 0;
    let winner = list[0];
    let rangeStart = 0;
    let rangeEnd = 0;

    for(const item of list){
      rangeStart = acc;
      acc += item.total;
      rangeEnd = acc;

      if(randomValue < acc){
        winner = item;
        break;
      }
    }

    wheelOverrideList = list;
    await spinToWinner(winner, list);

    const chanceAtDraw = winner.total / roundTotal * 100;

    const verifyRaw = JSON.stringify({
      batchId,
      round:i,
      time:batchTime,
      candidates:list.map(x=>({name:x.name,total:x.total})),
      roundTotal,
      randomValue,
      rangeStart,
      rangeEnd,
      winner:winner.name
    });

    const verifyHash = await sha256(verifyRaw);

    const result = {
      round:i,
      name:winner.name,
      total:winner.total,
      roundTotal,
      chanceAtDraw,
      randomValue,
      rangeStart,
      rangeEnd,
      verifyHash
    };

    results.push(result);

    if(noRepeat) excluded.push(winner.name);

    renderBatchResults(results);
  }

  wheelOverrideList = null;
  drawWheel();

  const batchRecord = {
    batchId,
    time:batchTime,
    drawCount:results.length,
    noRepeat,
    results
  };

  history.unshift(batchRecord);

  const winnerNames = results.map(r=>`第 ${r.round} 位：${r.name}`).join("<br>");
  document.getElementById("winnerName").textContent = results.length > 0 ? results[0].name : "無結果";
  document.getElementById("winnerInfo").textContent = `本次共抽出 ${results.length} 位`;
  document.getElementById("modalWinner").innerHTML = winnerNames || "---";
  document.getElementById("modalWinnerInfo").textContent = `抽獎時間：${batchTime}`;
  document.getElementById("winnerModal").style.display = "flex";

  renderHistory();
  await saveToFirebase();

  document.getElementById("startLotteryBtn").disabled = false;
};

window.exportCSV = function(){
  scanInputsToMemory();

  let csv = "人物名稱,";

  dates.forEach(date=>{
    csv += `${date}票數,${date}捐贈所得,${date}個人所得,`;
  });

  csv += "人物總票數,中獎率,個人總所得\n";

  people.forEach(person=>{
    let row = [person];

    dates.forEach(date=>{
      row.push(getVote(person,date));
      row.push(getDateIncome(date,"donationIncome"));
      row.push(getDateIncome(date,"personalIncome"));
    });

    row.push(getPersonTotal(person));
    row.push(getRate(person).toFixed(2) + "%");
    row.push(getPersonIncomeTotal(person));

    csv += row.join(",") + "\n";
  });

  const blob = new Blob(["\uFEFF" + csv],{type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "楓谷公會硬幣捐贈統計抽獎工具.csv";
  link.click();
};

async function renameDate(index,newName){
  if(!isEditMode) return;

  scanInputsToMemory();

  newName = newName.trim();

  if(!newName){
    renderAll();
    return;
  }

  const oldName = dates[index];

  if(oldName === newName) return;

  if(dates.includes(newName)){
    alert("這個日期已經存在");
    renderAll();
    return;
  }

  const oldIncomeKey = incomeKey(oldName);
  const newIncomeKey = incomeKey(newName);

  dates[index] = newName;

  if(dateIncome[oldIncomeKey]){
    dateIncome[newIncomeKey] = dateIncome[oldIncomeKey];
    delete dateIncome[oldIncomeKey];
  }

  votes = rebuildVotesAfterRename(oldName,newName,"date");

  renderAll();
  await saveToFirebase();
}

async function renamePerson(index,newName){
  if(!isEditMode) return;

  scanInputsToMemory();

  newName = newName.trim();

  if(!newName){
    renderAll();
    return;
  }

  const oldName = people[index];

  if(oldName === newName) return;

  if(people.includes(newName)){
    alert("這個人物已經存在");
    renderAll();
    return;
  }

  people[index] = newName;
  votes = rebuildVotesAfterRename(oldName,newName,"person");

  renderAll();
  await saveToFirebase();
}

function rebuildVotesAfterRename(oldName,newName,type){
  const newVotes = {};

  people.forEach(person=>{
    dates.forEach(date=>{
      let sourcePerson = person;
      let sourceDate = date;

      if(type === "person" && person === newName){
        sourcePerson = oldName;
      }

      if(type === "date" && date === newName){
        sourceDate = oldName;
      }

      const oldValue = votes[voteKey(sourcePerson,sourceDate)];
      if(oldValue !== undefined){
        newVotes[voteKey(person,date)] = oldValue;
      }
    });
  });

  return newVotes;
}

function setVoteLocal(personIndex,dateIndex,value){
  if(!isEditMode) return;

  const person = people[personIndex];
  const date = dates[dateIndex];

  if(!person || !date) return;

  votes[voteKey(person,date)] = Number(value) || 0;

  updateTotalsOnly();
  drawWheel();
}

async function setVoteAndSave(personIndex,dateIndex,value){
  setVoteLocal(personIndex,dateIndex,value);
  await saveToFirebase();
}

function setIncomeLocal(dateIndex,type,value){
  if(!isEditMode) return;

  const date = dates[dateIndex];
  if(!date) return;

  setDateIncome(date,type,value);

  updateTotalsOnly();
  drawWheel();
}

async function setIncomeAndSave(dateIndex,type,value){
  setIncomeLocal(dateIndex,type,value);
  await saveToFirebase();
}

  document.documentElement.style.setProperty("--name-col-width", width + "px");

    if(rateCell) rateCell.textContent = getRate(person).toFixed(2) + "%";

  if(grandCell) grandCell.textContent = grand;

function spinToWinner(winner, list){
  return new Promise(resolve=>{
    isSpinning = true;

    const roundTotal = list.reduce((sum,item)=>sum + item.total,0);

    let startAngle = 0;
    let targetMiddle = 0;

    for(const item of list){
      const angle = item.total / roundTotal * Math.PI * 2;
      if(item.name === winner.name){
        targetMiddle = startAngle + angle / 2;
        break;
      }
      startAngle += angle;
    }

    const pointerAngle = -Math.PI / 2;
    const targetRotation = pointerAngle - targetMiddle;
    const extraRounds = Math.PI * 2 * 5;
    const finalRotation = targetRotation + extraRounds;
    const startRotation = wheelRotation;
    const duration = 2600;
    const startTime = performance.now();

    function animate(now){
      const t = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 4);

      wheelRotation = startRotation + (finalRotation - startRotation) * eased;
      drawWheel();

      if(t < 1){
        requestAnimationFrame(animate);
      }else{
        wheelRotation = targetRotation;
        isSpinning = false;
        drawWheel();
        resolve();
      }
    }

    requestAnimationFrame(animate);
  });
}

function drawWheel(){
  const canvas = document.getElementById("wheelCanvas");
  if(!canvas) return;

  const ctx = canvas.getContext("2d");
  const list = getCurrentWheelList();
  const grandTotal = list.reduce((sum,item)=>sum + item.total,0);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = canvas.width * 0.46;

  if(list.length === 0 || grandTotal <= 0){
    ctx.fillStyle = "#fff7ed";
    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#92400e";
    ctx.font = "bold 34px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText("請先輸入票數",cx,cy);
    return;
  }

  const colors = ["#fca5a5","#fdba74","#fde68a","#86efac","#93c5fd","#c4b5fd","#f9a8d4","#67e8f9"];
  let angleStart = wheelRotation;

  list.forEach((item,i)=>{
    const angle = item.total / grandTotal * Math.PI * 2;
    const angleEnd = angleStart + angle;

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,radius,angleStart,angleEnd);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    ctx.strokeStyle = "#8b5e34";
    ctx.lineWidth = 3;
    ctx.stroke();

    const mid = angleStart + angle / 2;
    const textR = radius * 0.66;
    const tx = cx + Math.cos(mid) * textR;
    const ty = cy + Math.sin(mid) * textR;

    ctx.save();
    ctx.translate(tx,ty);
    ctx.rotate(mid);
    if(Math.cos(mid) < 0) ctx.rotate(Math.PI);

    ctx.fillStyle = "#4b2e13";
    ctx.font = "bold 22px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const rate = grandTotal > 0 ? item.total / grandTotal * 100 : 0;
    ctx.fillText(`${item.name} ${rate.toFixed(1)}%`.slice(0,18),0,0);
    ctx.restore();

    angleStart = angleEnd;
  });
}

function renderBatchResults(results){
  const box = document.getElementById("batchResultBox");

  if(!results || results.length === 0){
    box.innerHTML = "尚無本次結果";
    return;
  }

  box.innerHTML = results.map(r=>{
    return `
      <div>
        <b>第 ${r.round} 位：${escapeHtml(r.name)}</b><br>
        票數：${r.total}｜當輪中獎率：${r.chanceAtDraw.toFixed(2)}%<br>
        亂數值：${r.randomValue.toFixed(6)}｜命中區間：${r.rangeStart.toFixed(6)} ～ ${r.rangeEnd.toFixed(6)}
        <span class="verify">驗證碼：${r.verifyHash}</span>
      </div>
    `;
  }).join("");
}

function renderHistory(){
  const box = document.getElementById("historyBox");

  if(!history || history.length === 0){
    box.innerHTML = "尚無紀錄";
    return;
  }

  box.innerHTML = history.map((batch,index)=>{
    if(batch.results){
      const resultText = batch.results.map(r=>{
        return `
          <div>
            第 ${r.round} 位：<b>${escapeHtml(r.name)}</b>｜${r.total} 票｜當輪機率 ${Number(r.chanceAtDraw).toFixed(2)}%
            <span class="verify">亂數：${Number(r.randomValue).toFixed(6)}｜區間：${Number(r.rangeStart).toFixed(6)}～${Number(r.rangeEnd).toFixed(6)}｜驗證碼：${escapeHtml(r.verifyHash || "")}</span>
          </div>
        `;
      }).join("");

      return `
        <div>
          <b>批次 ${history.length - index}｜${escapeHtml(batch.time || "")}｜抽出 ${batch.drawCount || batch.results.length} 位｜${batch.noRepeat ? "不重複" : "可重複"}</b>
          ${resultText}
        </div>
      `;
    }

    return `<div>舊紀錄：${escapeHtml(JSON.stringify(batch))}</div>`;
  }).join("");
}

function formatNumber(num){
  const n = Number(num) || 0;
  return n.toLocaleString("zh-TW");
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
