<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>票數統計工具</title>
<style>
body{
  font-family:"Microsoft JhengHei",sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:20px;
  color:#222;
}

h1{text-align:center}

.toolbar{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:16px;
}

button{
  border:0;
  background:#2563eb;
  color:white;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
}

button:hover{background:#1d4ed8}
button:disabled{background:#9ca3af;cursor:not-allowed}

.danger{background:#dc2626}
.danger:hover{background:#b91c1c}

.status{
  text-align:center;
  margin-bottom:12px;
  font-weight:bold;
}

.readonly{color:#dc2626}
.editing{color:#16a34a}

.table-wrap{
  overflow:auto;
  background:white;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:0;
  max-height:70vh;
  position:relative;
}

table{
  border-collapse:separate;
  border-spacing:0;
  width:max-content;
  min-width:100%;
}

th,td{
  border-right:1px solid #d1d5db;
  border-bottom:1px solid #d1d5db;
  padding:8px;
  text-align:center;
  white-space:nowrap;
  background:white;
}

th{
  background:#e0ecff;
  font-weight:bold;
  position:sticky;
  top:0;
  z-index:5;
}

.name-col{
  background:#fef3c7;
  font-weight:bold;
  position:sticky;
  left:0;
  z-index:4;
  min-width:var(--nameColWidth, 160px);
  max-width:var(--nameColWidth, 160px);
}

th.name-col{
  z-index:8;
}

.total-col{
  background:#dcfce7;
  font-weight:bold;
  min-width:120px;
}

.total-row td{
  background:#fee2e2;
  font-weight:bold;
}

.total-row .name-col{
  background:#fecaca;
}

.vote-cell,
.date-cell{
  min-width:120px;
  max-width:120px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:6px;
  text-align:center;
  border:1px solid #cbd5e1;
  border-radius:6px;
  font-size:15px;
}

.name-input{
  text-align:left;
  font-weight:bold;
}

.date-input{
  font-weight:bold;
}

input:disabled{
  background:#f3f4f6;
  color:#374151;
}
</style>
</head>
<body>

<h1>票數統計工具</h1>

<div class="status" id="modeText">讀取中...</div>

<div class="toolbar">
  <button onclick="loginEdit()" id="loginBtn">進入編輯模式</button>
  <button onclick="logoutEdit()" id="logoutBtn" style="display:none;">離開編輯模式</button>
  <button onclick="addDate()" id="addDateBtn" disabled>新增日期</button>
  <button onclick="addPerson()" id="addPersonBtn" disabled>新增人物</button>
  <button onclick="exportCSV()">匯出 CSV</button>
  <button class="danger" onclick="clearData()" id="clearBtn" disabled>清空資料</button>
</div>

<div class="table-wrap">
  <table id="voteTable"></table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAFx2x9ICrWgXWXiSSyt1_vW40j1v1JSA",
  authDomain: "vote-tracker-7ead2.firebaseapp.com",
  databaseURL: "https://vote-tracker-7ead2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "vote-tracker-7ead2",
  storageBucket: "vote-tracker-7ead2.firebasestorage.app",
  messagingSenderId: "788601350797",
  appId: "1:788601350797:web:4cb65f367cc0430dc250c4"
};

const EDIT_PASSWORD = "NM4DJ";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dataRef = ref(db, "voteTracker/main");

let isEditMode = sessionStorage.getItem("vote_edit_mode") === "true";
let dates = ["5/10"];
let people = ["人物A", "人物B"];
let votes = {};

window.loginEdit = function() {
  const pwd = prompt("請輸入編輯密碼");

  if (pwd === null) return;

  if (pwd === EDIT_PASSWORD) {
    isEditMode = true;
    sessionStorage.setItem("vote_edit_mode", "true");
    updateMode();
    renderTable();
  } else {
    alert("密碼錯誤");
  }
};

window.logoutEdit = function() {
  isEditMode = false;
  sessionStorage.removeItem("vote_edit_mode");
  updateMode();
  renderTable();
};

function updateMode() {
  document.getElementById("modeText").innerHTML = isEditMode
    ? "<span class='editing'>目前狀態：編輯模式</span>"
    : "<span class='readonly'>目前狀態：唯讀模式</span>";

  document.getElementById("loginBtn").style.display = isEditMode ? "none" : "inline-block";
  document.getElementById("logoutBtn").style.display = isEditMode ? "inline-block" : "none";

  document.getElementById("addDateBtn").disabled = !isEditMode;
  document.getElementById("addPersonBtn").disabled = !isEditMode;
  document.getElementById("clearBtn").disabled = !isEditMode;
}

function saveData() {
  if (!isEditMode) return;
  renderTable();
  set(dataRef, { dates, people, votes });
}

onValue(dataRef, snapshot => {
  const data = snapshot.val();

  if (data) {
    dates = data.dates || [];
    people = data.people || [];
    votes = data.votes || {};
  } else {
    dates = ["5/10"];
    people = ["人物A", "人物B"];
    votes = {};
    if (isEditMode) saveData();
  }

  updateMode();
  renderTable();
});

function getVote(person, date) {
  return Number(votes[person + "_" + date]) || 0;
}

window.setVoteByIndex = function(personIndex, dateIndex, value) {
  if (!isEditMode) return alert("請先進入編輯模式");

  const person = people[personIndex];
  const date = dates[dateIndex];

  votes[person + "_" + date] = Number(value) || 0;
  saveData();
};

function getNameColWidth() {
  let maxLength = 4;

  people.forEach(name => {
    maxLength = Math.max(maxLength, String(name).length);
  });

  return Math.max(160, maxLength * 18 + 70);
}

function renderTable() {
  const table = document.getElementById("voteTable");
  document.documentElement.style.setProperty("--nameColWidth", getNameColWidth() + "px");

  let html = "<tr>";
  html += "<th class='name-col'>人物名稱</th>";

  dates.forEach((date, index) => {
    html += `
      <th class="date-cell">
        <input class="date-input" value="${htmlText(date)}" ${isEditMode ? "" : "disabled"}
        onchange="renameDate(${index}, this.value)">
      </th>
    `;
  });

  html += "<th class='total-col'>人物總票數</th>";
  html += "</tr>";

  people.forEach((person, pIndex) => {
    html += "<tr>";

    html += `
      <td class="name-col">
        <input class="name-input" value="${htmlText(person)}" ${isEditMode ? "" : "disabled"}
        onchange="renamePerson(${pIndex}, this.value)">
      </td>
    `;

    let personTotal = 0;

    dates.forEach((date, dIndex) => {
      const value = getVote(person, date);
      personTotal += value;

      html += `
        <td class="vote-cell">
          <input type="number" min="0" value="${value}" ${isEditMode ? "" : "disabled"}
          onchange="setVoteByIndex(${pIndex}, ${dIndex}, this.value)">
        </td>
      `;
    });

    html += `<td class="total-col">${personTotal}</td>`;
    html += "</tr>";
  });

  html += "<tr class='total-row'>";
  html += "<td class='name-col'>每日總票數</td>";

  let grandTotal = 0;

  dates.forEach(date => {
    let dateTotal = 0;

    people.forEach(person => {
      dateTotal += getVote(person, date);
    });

    grandTotal += dateTotal;
    html += `<td class="vote-cell">${dateTotal}</td>`;
  });

  html += `<td class="total-col">${grandTotal}</td>`;
  html += "</tr>";

  table.innerHTML = html;
}

window.addDate = function() {
  if (!isEditMode) return alert("請先進入編輯模式");

  const newDate = prompt("請輸入日期，例如：5/11");
  if (newDate === null) return;

  const value = newDate.trim();
  if (!value) return;

  if (dates.includes(value)) {
    alert("這個日期已經存在");
    return;
  }

  dates.push(value);
  saveData();
};

window.addPerson = function() {
  if (!isEditMode) return alert("請先進入編輯模式");

  const newPerson = prompt("請輸入人物名稱");
  if (newPerson === null) return;

  const value = newPerson.trim();
  if (!value) return;

  if (people.includes(value)) {
    alert("這個人物已經存在");
    return;
  }

  people.push(value);
  saveData();
};

window.renameDate = function(index, newName) {
  if (!isEditMode) return;

  const oldName = dates[index];
  const value = newName.trim();

  if (!value) {
    renderTable();
    return;
  }

  if (dates.includes(value) && value !== oldName) {
    alert("這個日期已經存在");
    renderTable();
    return;
  }

  dates[index] = value;

  const newVotes = {};
  Object.keys(votes).forEach(key => {
    const suffix = "_" + oldName;

    if (key.endsWith(suffix)) {
      const newKey = key.slice(0, -suffix.length) + "_" + value;
      newVotes[newKey] = votes[key];
    } else {
      newVotes[key] = votes[key];
    }
  });

  votes = newVotes;
  saveData();
};

window.renamePerson = function(index, newName) {
  if (!isEditMode) return;

  const oldName = people[index];
  const value = newName.trim();

  if (!value) {
    renderTable();
    return;
  }

  if (people.includes(value) && value !== oldName) {
    alert("這個人物已經存在");
    renderTable();
    return;
  }

  people[index] = value;

  const newVotes = {};
  Object.keys(votes).forEach(key => {
    const prefix = oldName + "_";

    if (key.startsWith(prefix)) {
      const newKey = value + "_" + key.slice(prefix.length);
      newVotes[newKey] = votes[key];
    } else {
      newVotes[key] = votes[key];
    }
  });

  votes = newVotes;
  saveData();
};

window.clearData = function() {
  if (!isEditMode) return alert("請先進入編輯模式");
  if (!confirm("確定要清空所有資料嗎？")) return;

  dates = ["5/10"];
  people = ["人物A", "人物B"];
  votes = {};
  saveData();
};

window.exportCSV = function() {
  let csv = "人物名稱," + dates.join(",") + ",人物總票數\n";

  people.forEach(person => {
    let row = [person];
    let total = 0;

    dates.forEach(date => {
      const value = getVote(person, date);
      row.push(value);
      total += value;
    });

    row.push(total);
    csv += row.join(",") + "\n";
  });

  let totalRow = ["每日總票數"];
  let grandTotal = 0;

  dates.forEach(date => {
    let dateTotal = 0;

    people.forEach(person => {
      dateTotal += getVote(person, date);
    });

    totalRow.push(dateTotal);
    grandTotal += dateTotal;
  });

  totalRow.push(grandTotal);
  csv += totalRow.join(",");

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "票數統計.csv";
  link.click();
};

function htmlText(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll('"', "&quot;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
</script>

</body>
</html>
